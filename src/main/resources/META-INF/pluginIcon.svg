<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40">
    <rect width="40" height="40" rx="8" fill="#3574F0"/>
    <g fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <!-- Incoming line -->
        <line x1="8" y1="20" x2="18" y2="20"/>
        <!-- Fork node -->
        <circle cx="20" cy="20" r="3" fill="#FFFFFF" stroke="none"/>
        <!-- Top route arrow -->
        <polyline points="20,20 28,12 32,12"/>
        <polyline points="29,9 32,12 29,15"/>
        <!-- Bottom route arrow -->
        <polyline points="20,20 28,28 32,28"/>
        <polyline points="29,25 32,28 29,31"/>
    </g>
</svg>
